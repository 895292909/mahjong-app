<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>麻将排桌</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header">
    <h1>🀄 麻将排桌</h1>
    <div class="header-right">
      <div class="player-avatar" id="headerAvatar" onclick="showProfile()">?</div>
    </div>
  </div>

  <div class="container">
    <div class="section-title">🏠 选择麻将馆</div>
    <div class="hall-grid" id="hallList">
      <div class="loading"><div class="spinner"></div>加载中...</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="/" class="active">
      <span class="nav-icon">🏠</span>首页
    </a>
    <a href="javascript:void(0)" onclick="showProfile()">
      <span class="nav-icon">👤</span>我的
    </a>
    <a href="/owner.html">
      <span class="nav-icon">⚙️</span>老板入口
    </a>
  </nav>

  <!-- Player info / profile modal -->
  <div class="modal-overlay center" id="profileModal">
    <div class="modal" style="position:relative">
      <button class="btn-close" onclick="closeModal('profileModal')">✕</button>
      <h2 id="profileTitle">设置个人信息</h2>
      <div class="profile-display" id="profileDisplay" style="display:none">
        <div class="profile-avatar-lg" id="profileAvatar">?</div>
        <div class="profile-name" id="profileName"></div>
        <div class="profile-phone" id="profilePhone"></div>
        <button class="btn btn-sm btn-secondary" onclick="toggleProfileEdit()" style="margin-top:12px">修改信息</button>
      </div>
      <div id="profileEdit">
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="profileNickname" placeholder="输入昵称" maxlength="20">
        </div>
        <div class="form-group">
          <label>手机号 <span style="color:var(--red)">*</span></label>
          <input type="tel" id="profilePhoneInput" placeholder="输入手机号" maxlength="11">
        </div>
        <div class="form-group">
          <label>微信号（选填）</label>
          <input type="text" id="profileWechat" placeholder="输入微信号">
        </div>
        <div class="form-group">
          <label>联系方式可见性</label>
          <select id="profilePrivacy">
            <option value="game_only">同局玩家可见</option>
            <option value="always">所有人可见</option>
            <option value="never">所有人不可见</option>
          </select>
          <div class="hint">同局模式下，只有同一牌桌的玩家可以查看你的联系方式</div>
        </div>
        <button class="btn btn-primary btn-block" onclick="saveProfile()">保存</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
